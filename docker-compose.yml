version: '3.8'

services:
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    working_dir: /app
    environment:
      - WEATHER_API_KEY=${WEATHER_API_KEY:-7c4ab397891eab8aaccf139a201d5c6b}
      - WEATHER_CITY=${WEATHER_CITY:-Presidente Prudente}
      - COLLECT_INTERVAL_SECONDS=${COLLECT_INTERVAL_SECONDS:-3600}
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: on-failure
    networks:
      - app-network

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:4000
    depends_on:
      - backend
    networks:
      - app-network
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
            - '*.test.js'
        
        - action: rebuild
          path: package.json
        
        - action: sync+restart
          path: ./config
          target: /app/config

  backend:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - PORT=4000
      - MONGODB_URI=mongodb://mongo:27017/weather_insights
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - JWT_SECRET=${JWT_SECRET:-super-secret-key}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-123456}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:5173,http://172.26.0.5:5173,http://localhost:3000}
    depends_on:
      - mongo
      - rabbitmq
    networks:
      - app-network
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - node_modules/
            - '*.test.js'
        
        - action: rebuild
          path: package.json
        
        - action: sync+restart
          path: ./config
          target: /app/config

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    environment:
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
      - API_BASE_URL=http://backend:4000
      - QUEUE_NAME=weather_queue
      - MAX_RETRIES=3
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
      collector:
        condition: service_started
    restart: on-failure
    networks:
      - app-network

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  mongo_data:
  rabbitmq_data:

networks:
  app-network:
    driver: bridge